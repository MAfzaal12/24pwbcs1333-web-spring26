<!DOCTYPE html>
<html>
<head>
<title>Image Styling</title>

<style>

.gallery img{
width:200px;
margin:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
filter:grayscale(50%);
}

</style>

</head>

<body>

<h1>Image Gallery</h1>

<div class="gallery">

<img src="/images/car image.jpg">
<img src="/images/city image.jpg">
<img src="/images/mountain image.png">

</div>

</body>
</html>
